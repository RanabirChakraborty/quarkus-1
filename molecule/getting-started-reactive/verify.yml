---
- name: Validation
  hosts: all
  vars_files:
    - ../vars.yml
  tasks:
    - name: "Verify that Quarkus app is deployed properly."
      ansible.builtin.include_role:
        name: quarkus
        tasks_from: validate_deployment.yml
      vars:
        quarkus_app_validation_paths:
          - { path: 'hello/greeting/Bob' }
